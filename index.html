<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Messenger | Secure Privacy Layer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #0f172a, #020617);
            font-family: 'Space Grotesk', sans-serif;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }
        .neo-input {
            background: rgba(2, 6, 23, 0.9);
            border: 1px solid #1e293b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neo-input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
        }
        .logo-glow {
            filter: drop-shadow(0 0 8px #22d3ee);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0891b2, #0e7490);
        }
        .btn-primary:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass-card rounded-[2.5rem] p-8 relative overflow-hidden">
        
        <div class="flex flex-col items-center mb-8">
            <div class="h-16 w-16 mb-4 bg-cyan-500/10 rounded-2xl flex items-center justify-center border-2 border-cyan-500/40 logo-glow">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter text-white">
                VAULT <span class="text-cyan-400">MESSENGER</span>
            </h1>
            <p class="text-slate-500 text-[10px] tracking-[0.3em] font-bold uppercase mt-1">Encrypted Communication Protocol</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Secret Shift Key</label>
                <input type="number" id="shiftKey" value="7" min="0" max="25"
                       class="w-full neo-input rounded-2xl p-4 text-center text-cyan-400 text-2xl font-bold">
            </div>
            <div class="space-y-2 text-center">
                <label class="text-[10px] font-bold text-slate-400 uppercase">Stealth Display</label>
                <button onclick="toggleStealth()" id="stealthBtn" class="w-full h-[62px] rounded-2xl bg-slate-800/50 border border-slate-700 text-slate-400 font-bold text-sm hover:border-cyan-500 transition-all">
                    OFF
                </button>
            </div>
        </div>

        <div class="mb-8">
            <textarea id="mainInput" placeholder="Enter message to encrypt or decrypt..." 
                      class="w-full neo-input rounded-3xl p-6 h-36 text-slate-200 resize-none outline-none text-lg"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="handleAction('encrypt')" 
                    class="btn-primary py-5 rounded-3xl text-white font-bold flex flex-col items-center justify-center transition-all shadow-lg shadow-cyan-900/20">
                <span class="text-xl">ENCRYPT</span>
                <span class="text-[9px] opacity-60 tracking-widest mt-1">HIDE MESSAGE</span>
            </button>
            <button onclick="handleAction('decrypt')" 
                    class="bg-slate-800 hover:bg-slate-700 py-5 rounded-3xl text-white font-bold flex flex-col items-center justify-center transition-all border border-slate-700">
                <span class="text-xl">DECRYPT</span>
                <span class="text-[9px] opacity-60 tracking-widest mt-1">REVEAL TEXT</span>
            </button>
        </div>

        <div id="resultBox" class="hidden animate-in slide-in-from-bottom-4 duration-500 mb-8">
            <div class="p-6 rounded-3xl bg-cyan-500/5 border border-cyan-500/20 relative">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-cyan-400 tracking-widest" id="resultLabel uppercase">ENCRYPTED OUTPUT</span>
                    <button onclick="copyResult()" class="text-[9px] bg-cyan-500 text-black font-black px-3 py-1 rounded-full uppercase hover:bg-white transition-all">Copy</button>
                </div>
                <p id="resultText" class="text-xl break-words text-white font-medium leading-relaxed"></p>
                <div id="timer" class="mt-4 h-1 bg-cyan-500/20 rounded-full overflow-hidden">
                    <div id="timerBar" class="h-full bg-cyan-400 w-full transition-all duration-[30000ms] ease-linear"></div>
                </div>
            </div>
        </div>

        <div class="border-t border-slate-800/50 pt-6 mt-4 flex flex-col items-center">
            <p class="text-[11px] text-slate-500 font-medium">Developed by</p>
            <a href="mailto:manis.programmer@gmail.com" class="text-cyan-400 text-sm font-bold hover:underline">manis.programmer@gmail.com</a>
            <p class="text-[9px] text-slate-600 mt-4 uppercase tracking-[0.4em]">Solana Ecosystem • 2026</p>
        </div>
    </div>

    <script>
        let isStealth = false;
        let timerTimeout;

        function toggleStealth() {
            isStealth = !isStealth;
            const btn = document.getElementById('stealthBtn');
            const input = document.getElementById('mainInput');
            
            if (isStealth) {
                btn.innerText = "ACTIVE";
                btn.classList.add('border-cyan-500', 'text-cyan-400');
                input.style.webkitTextSecurity = "disc";
            } else {
                btn.innerText = "OFF";
                btn.classList.remove('border-cyan-500', 'text-cyan-400');
                input.style.webkitTextSecurity = "none";
            }
        }

        function runCipher(text, shift) {
            return text.split('').map(char => {
                if (char.match(/[a-z]/i)) {
                    const code = char.charCodeAt(0);
                    const start = code >= 65 && code <= 90 ? 65 : 97;
                    return String.fromCharCode(((code - start + shift) % 26 + 26) % 26 + start);
                }
                return char;
            }).join('');
        }

        function handleAction(mode) {
            const text = document.getElementById('mainInput').value;
            let key = parseInt(document.getElementById('shiftKey').value) || 0;
            if (!text) return;

            if (mode === 'decrypt') key = -key;
            const result = runCipher(text, key);
            
            const box = document.getElementById('resultBox');
            const bar = document.getElementById('timerBar');
            
            document.getElementById('resultText').innerText = result;
            document.getElementById('resultLabel').innerText = mode + "ED DATA";
            box.classList.remove('hidden');

            // Reset Timer
            clearTimeout(timerTimeout);
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = 'width 30000ms linear';
                bar.style.width = '0%';
            }, 50);

            timerTimeout = setTimeout(() => {
                box.classList.add('hidden');
                document.getElementById('resultText').innerText = "";
            }, 30000);
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
        }
    </script>
</body>
</html>
