<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault Pro | Secure Messaging</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            font-family: 'Space Grotesk', sans-serif;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .neo-input {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .neo-input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
        }
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg glass-card rounded-3xl p-6 md:p-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    CIPHERVAULT
                </h1>
                <p class="text-slate-400 text-xs tracking-widest uppercase">Web 4.0 Privacy Layer</p>
            </div>
            <div class="h-10 w-10 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-500/50">
                <span class="animate-pulse text-cyan-400">🔒</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="p-4 rounded-2xl bg-slate-800/50 border border-slate-700">
                <label class="text-xs text-slate-400 block mb-2 font-bold uppercase">Secret Key</label>
                <input type="number" id="shiftKey" value="7" min="0" max="25"
                       class="w-full neo-input rounded-xl p-2 text-center text-cyan-400 text-xl font-bold">
            </div>
            <div class="p-4 rounded-2xl bg-slate-800/50 border border-slate-700 flex flex-col justify-center">
                <label class="text-xs text-slate-400 block mb-2 font-bold uppercase">Stealth Mode</label>
                <button onclick="toggleStealth()" id="stealthBtn" class="text-sm py-1 px-3 rounded-full bg-slate-700 text-slate-300 transition-all">
                    OFF
                </button>
            </div>
        </div>

        <div class="mb-6">
            <label class="text-xs text-slate-400 block mb-2 font-bold uppercase">Message Console</label>
            <textarea id="mainInput" placeholder="Enter your text here..." 
                      class="w-full neo-input rounded-2xl p-4 h-32 text-slate-200 resize-none outline-none"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="handleAction('encrypt')" 
                    class="btn-glow bg-cyan-600 text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center transition-all">
                <span class="text-lg">ENCRYPT</span>
                <span class="text-[10px] opacity-70">SCRAMBLE DATA</span>
            </button>
            <button onclick="handleAction('decrypt')" 
                    class="btn-glow bg-slate-700 text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center transition-all border border-slate-600">
                <span class="text-lg">DECRYPT</span>
                <span class="text-[10px] opacity-70">REVEAL DATA</span>
            </button>
        </div>

        <div id="resultBox" class="hidden animate-in fade-in zoom-in duration-300">
            <div class="p-4 rounded-2xl bg-cyan-500/10 border border-cyan-500/30">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-cyan-400 uppercase" id="resultLabel">Result</span>
                    <button onclick="copyResult()" class="text-[10px] bg-cyan-500 text-black font-bold px-2 py-1 rounded hover:bg-white transition-colors">COPY</button>
                </div>
                <p id="resultText" class="text-lg break-words text-white font-medium"></p>
            </div>
        </div>

        <p class="text-center text-slate-500 text-[10px] mt-8 uppercase tracking-widest">
            Stored locally • No server tracking • 2026 Edition
        </p>
    </div>

    <script>
        let isStealth = false;

        function toggleStealth() {
            isStealth = !isStealth;
            const btn = document.getElementById('stealthBtn');
            const input = document.getElementById('mainInput');
            
            if (isStealth) {
                btn.innerText = "ON";
                btn.className = "text-sm py-1 px-3 rounded-full bg-cyan-500 text-black font-bold";
                input.style.webkitTextSecurity = "disc"; // Masks text like a password
            } else {
                btn.innerText = "OFF";
                btn.className = "text-sm py-1 px-3 rounded-full bg-slate-700 text-slate-300";
                input.style.webkitTextSecurity = "none";
            }
        }

        function runCipher(text, shift) {
            return text.split('').map(char => {
                if (char.match(/[a-z]/i)) {
                    const code = char.charCodeAt(0);
                    const start = code >= 65 && code <= 90 ? 65 : 97;
                    return String.fromCharCode(((code - start + shift) % 26 + 26) % 26 + start);
                }
                return char;
            }).join('');
        }

        function handleAction(mode) {
            const text = document.getElementById('mainInput').value;
            let key = parseInt(document.getElementById('shiftKey').value) || 0;
            
            if (!text) return;

            if (mode === 'decrypt') key = -key;

            const result = runCipher(text, key);
            
            document.getElementById('resultText').innerText = result;
            document.getElementById('resultLabel').innerText = mode + "ED DATA";
            document.getElementById('resultBox').classList.remove('hidden');
        }

        function copyResult() {
            const text = document.getElementById('resultText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
